<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出貨後台｜豆媽選品</title>
<style>
  :root{
    --bg:#F7F4EE; --surface:#FFFFFF; --line:#E3DACB; --text:#3E3226; --muted:#8C7C6C;
    --primary:#BD8149; --primary-dark:#9C6835; --accent:#7C8B6A; --danger:#C1666B;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,"Noto Sans TC",sans-serif; }
  .wrap{ max-width:960px; margin:0 auto; padding:24px 18px 60px; }
  h1{ font-size:20px; margin:0 0 18px; }
  .login-box{ max-width:340px; margin:80px auto; background:#fff; border:1px solid var(--line); border-radius:14px; padding:24px; }
  .login-box input{ width:100%; padding:12px; border:1px solid var(--line); border-radius:8px; font-size:15px; margin-bottom:12px; }
  .btn{ padding:10px 18px; border:none; border-radius:8px; background:var(--primary); color:#fff; font-weight:700; cursor:pointer; font-size:14px; }
  .btn:active{ background:var(--primary-dark); }
  .btn-outline{ background:#fff; border:1px solid var(--primary); color:var(--primary-dark); }
  .btn:disabled{ background:#D9CBB6; cursor:not-allowed; }
  .toolbar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:16px; }
  select, input[type=date]{ padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
  table{ width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--line); border-radius:10px; overflow:hidden; font-size:13px; }
  th, td{ padding:9px 8px; border-bottom:1px solid var(--line); text-align:left; white-space:nowrap; }
  th{ background:#F1EAD9; color:var(--muted); font-weight:700; }
  tr:hover td{ background:#FBF6EE; }
  .missing{ color:var(--danger); font-weight:700; }
  .badge{ display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; background:var(--accent); color:#fff; }
  .empty{ text-align:center; padding:40px; color:var(--muted); }
  .footer-bar{ position:sticky; bottom:0; background:var(--bg); padding:14px 0; display:flex; gap:10px; align-items:center; }
  .status{ font-size:13px; color:var(--muted); }
  .table-scroll{ overflow-x:auto; }
</style>
</head>
<body>

<div id="loginScreen" class="login-box">
  <h1>出貨後台</h1>
  <input type="password" id="adminCode" placeholder="請輸入管理密碼">
  <button class="btn" style="width:100%;" onclick="login()">登入</button>
  <div id="loginError" style="color:var(--danger); font-size:13px; margin-top:8px;"></div>
</div>

<div class="wrap" id="mainScreen" style="display:none;">
  <h1>🥜 出貨後台</h1>

  <div class="toolbar">
    <select id="statusFilter" onchange="loadOrders()">
      <option value="進行中">進行中（不含已完成）</option>
      <option value="全部">全部狀態</option>
      <option value="確認中">確認中</option>
      <option value="已收到款項">已收到款項</option>
      <option value="待出貨">待出貨</option>
      <option value="已出貨">已出貨</option>
      <option value="商品斷貨退款（退回購物金）">商品斷貨退款（退回購物金）</option>
      <option value="訂單完成">訂單完成</option>
    </select>
    <select id="shipFilter" onchange="loadOrders()">
      <option value="全部">全部配送方式</option>
      <option value="宅配">宅配</option>
      <option value="超商">超商取貨</option>
    </select>
    <button class="btn-outline btn" onclick="loadOrders()">重新整理</button>
    <span class="status" id="statusText"></span>
  </div>

  <div class="table-scroll">
    <table id="orderTable" style="display:none;">
      <thead>
        <tr>
          <th><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
          <th>訂單編號</th><th>狀態</th><th>姓名</th><th>社群名稱</th><th>電話</th><th>品項</th><th>商品金額</th><th>運費</th><th>實付</th>
          <th>配送方式</th><th>收件人</th><th>地址/門市</th><th>店號</th><th>Email</th>
        </tr>
      </thead>
      <tbody id="orderBody"></tbody>
    </table>
    <div class="empty" id="emptyState">目前沒有待出貨的訂單</div>
  </div>

  <div class="footer-bar">
    <span class="status">已勾選 <b id="selectedCount">0</b> 筆</span>
    <select id="serviceCode">
      <option value="2">常溫取貨不付款-一般材積</option>
      <option value="3">常溫取貨不付款-120cm</option>
      <option value="4">常溫取貨不付款-經濟交貨便</option>
    </select>
    <button class="btn" id="exportSevenBtn" onclick="exportSeven()">匯出 7-11 交貨便格式</button>
    <button class="btn" id="exportHCTBtn" onclick="exportHCT()">匯出新竹物流 HCT 格式</button>
  </div>
  <div class="hint" style="font-size:12px; color:var(--muted);">
    ⚠️ 匯出後該筆訂單狀態會自動改為「已出貨」；匯出 HCT 時請只勾選「宅配」的訂單。若欄位顯示紅字代表資料不齊全，建議匯出後在下載的檔案中手動補上。狀態選單可隨時手動調整，選到「商品斷貨退款」會立即把該筆金額退回會員購物金，此動作無法復原請小心操作。
  </div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbymIooSb6VQ2WlIz-7c_0__wtos-UUe_1JUa198LJeAVjHIudZ4YXk7yYhXoxoV-YKn/exec';
var adminCode = '';
var allOrders = [];
var ALL_STATUSES = ['確認中', '已收到款項', '待出貨', '已出貨', '商品斷貨退款（退回購物金）', '訂單完成'];

function gasGet(params){
  return new Promise(function(resolve, reject){
    var cbName = 'gascb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    var script = document.createElement('script');
    window[cbName] = function(data){ resolve(data); delete window[cbName]; script.remove(); };
    var query = Object.keys(params).map(function(k){ return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); }).join('&');
    script.src = GAS_URL + '?' + query + '&callback=' + cbName;
    script.onerror = function(){ reject(new Error('連線失敗')); };
    document.body.appendChild(script);
  });
}
function gasPostJson(payload){
  return fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  }).then(function(r){ return r.json(); });
}
function gasPostAction(action, payload){
  return fetch(GAS_URL + '?action=' + action, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  }).then(function(r){ return r.json(); });
}

function login(){
  var code = document.getElementById('adminCode').value.trim();
  if(!code){ return; }
  adminCode = code;
  document.getElementById('loginError').textContent = '';
  loadOrders();
}

function loadOrders(){
  document.getElementById('statusText').textContent = '載入中…';
  gasGet({
    action:'adminList', code: adminCode,
    shipMethod: document.getElementById('shipFilter').value,
    status: document.getElementById('statusFilter').value
  })
    .then(function(res){
      if(!res.success){
        document.getElementById('loginScreen').style.display = '';
        document.getElementById('mainScreen').style.display = 'none';
        document.getElementById('loginError').textContent = res.message || '密碼錯誤';
        return;
      }
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = '';
      allOrders = res.orders || [];
      renderTable();
      document.getElementById('statusText').textContent = '共 ' + allOrders.length + ' 筆';
    })
    .catch(function(){
      document.getElementById('statusText').textContent = '載入失敗，請確認網路連線';
    });
}

function renderTable(){
  var table = document.getElementById('orderTable');
  var empty = document.getElementById('emptyState');
  var body = document.getElementById('orderBody');
  body.innerHTML = '';

  if(!allOrders.length){
    table.style.display = 'none';
    empty.style.display = '';
    return;
  }
  table.style.display = '';
  empty.style.display = 'none';

  allOrders.forEach(function(o){
    var tr = document.createElement('tr');
    var isStore = String(o.shipMethod).indexOf('超商') > -1;
    var storeCodeCell = o.storeCode ? escapeHtml(o.storeCode) : (isStore ? '<span class="missing">未填</span>' : '—');
    var emailCell = o.recipientEmail ? escapeHtml(o.recipientEmail) : (isStore ? '<span class="missing">未填</span>' : '—');

    var statusOptions = ALL_STATUSES.map(function(s){
      return '<option value="' + escapeHtml(s) + '"' + (s === o.status ? ' selected' : '') + '>' + escapeHtml(s) + '</option>';
    }).join('');

    tr.innerHTML =
      '<td><input type="checkbox" class="rowChk" data-row="' + o.rowNumber + '" onchange="updateCount()"></td>' +
      '<td>' + escapeHtml(o.orderId) + '</td>' +
      '<td><select onchange="updateStatus(' + o.rowNumber + ', this.value, this)">' + statusOptions + '</select></td>' +
      '<td>' + escapeHtml(o.name) + '</td>' +
      '<td>' + escapeHtml(o.socialName || '—') + '</td>' +
      '<td>' + escapeHtml(o.phone) + '</td>' +
      '<td>' + escapeHtml(String(o.items||'')) + '</td>' +
      '<td>NT$' + o.itemAmount + '</td>' +
      '<td>' + (o.shippingFee ? ('NT$' + o.shippingFee) : '免運') + '</td>' +
      '<td>NT$' + o.amount + '</td>' +
      '<td><span class="badge">' + escapeHtml(String(o.shipMethod||'')) + '</span></td>' +
      '<td>' + escapeHtml(o.recipientName) + ' ' + escapeHtml(o.recipientPhone) + '</td>' +
      '<td>' + escapeHtml(String(o.addressOrStore||'')) + '</td>' +
      '<td>' + storeCodeCell + '</td>' +
      '<td>' + emailCell + '</td>';
    body.appendChild(tr);
  });
  updateCount();
}

function updateStatus(rowNumber, newStatus, selectEl){
  selectEl.disabled = true;
  gasPostAction('adminUpdateStatus', { code: adminCode, rowNumber: rowNumber, newStatus: newStatus })
    .then(function(res){
      selectEl.disabled = false;
      if(!res.success){
        alert('更新失敗：' + (res.message || '請稍後再試'));
        return;
      }
      if(newStatus === '商品斷貨退款（退回購物金）'){
        alert('已將該筆訂單金額退回會員購物金');
      }
      loadOrders();
    })
    .catch(function(){
      selectEl.disabled = false;
      alert('更新失敗，請確認網路連線');
    });
}

function toggleAll(box){
  document.querySelectorAll('.rowChk').forEach(function(c){ c.checked = box.checked; });
  updateCount();
}
function updateCount(){
  document.getElementById('selectedCount').textContent = document.querySelectorAll('.rowChk:checked').length;
}
function getSelectedRowNumbers(){
  return Array.from(document.querySelectorAll('.rowChk:checked')).map(function(c){ return Number(c.dataset.row); });
}

function downloadBase64File(base64Data, fileName){
  var link = document.createElement('a');
  link.href = 'data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,' + base64Data;
  link.download = fileName;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function exportSeven(){
  var rowNumbers = getSelectedRowNumbers();
  if(!rowNumbers.length){ alert('請先勾選訂單'); return; }
  document.getElementById('exportSevenBtn').disabled = true;
  gasPostAction('exportSeven', {
    code: adminCode, orderRowNumbers: rowNumbers, serviceCode: document.getElementById('serviceCode').value
  }).then(function(res){
    document.getElementById('exportSevenBtn').disabled = false;
    if(res.success){
      downloadBase64File(res.fileBase64, res.fileName);
      loadOrders();
    } else {
      alert('匯出失敗：' + (res.message || '請稍後再試'));
    }
  }).catch(function(){
    document.getElementById('exportSevenBtn').disabled = false;
    alert('匯出失敗，請確認網路連線');
  });
}

function exportHCT(){
  var rowNumbers = getSelectedRowNumbers();
  if(!rowNumbers.length){ alert('請先勾選訂單'); return; }
  document.getElementById('exportHCTBtn').disabled = true;
  gasPostAction('exportHCT', {
    code: adminCode, orderRowNumbers: rowNumbers
  }).then(function(res){
    document.getElementById('exportHCTBtn').disabled = false;
    if(res.success){
      downloadBase64File(res.fileBase64, res.fileName);
      loadOrders();
    } else {
      alert('匯出失敗：' + (res.message || '請稍後再試'));
    }
  }).catch(function(){
    document.getElementById('exportHCTBtn').disabled = false;
    alert('匯出失敗，請確認網路連線');
  });
}

function escapeHtml(str){
  return String(str == null ? '' : str).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
</script>

</body>
</html>
